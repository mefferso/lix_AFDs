office:
  wfo: LIX
  cwa_name: New Orleans/Baton Rouge
  forecast_area: Southeast Louisiana and southern Mississippi
  timezone: America/Chicago

nws_api:
  user_agent: "lix-afd-assistant/0.8 michael.wfo-lix.local"
  base_url: "https://api.weather.gov"

observations:
  stations:
    - KMSY
    - KNEW
    - KBTR
    - KHDC
    - KGPT
    - KASD
    - KHUM
    - KHSA
    - KMCB

upper_air:
  enabled: false
  station_name: KLIX
  station_wmo: "72233"
  station_ids_to_try:
    - "72233"
    - "KLIX"
  source: "University of Wyoming upper-air text listing"
  region: "naconf"
  cycles_to_try: 4
  request_timeout_seconds: 8

text_products:
  previous_afd:
    type: AFD
    location: LIX

alerts:
  areas:
    - LA
    - MS

external_text_sources:
  enabled: true
  sources:
    spc_day1_outlook:
      url: "https://www.spc.noaa.gov/products/outlook/day1otlk.txt"
      purpose: "SPC Day 1 convective outlook text"
    spc_day2_outlook:
      url: "https://www.spc.noaa.gov/products/outlook/day2otlk.txt"
      purpose: "SPC Day 2 convective outlook text"
    spc_day3_outlook:
      url: "https://www.spc.noaa.gov/products/outlook/day3otlk.txt"
      purpose: "SPC Day 3 convective outlook text"
    nhc_atlantic_two:
      url: "https://www.nhc.noaa.gov/text/MIATWOAT.shtml?text"
      purpose: "NHC Atlantic Tropical Weather Outlook text version"
    nhc_gulf_twd:
      url: "https://www.nhc.noaa.gov/text/MIATWDAT.shtml?text"
      purpose: "NHC Tropical Weather Discussion text version with Gulf context"

model_context:
  enabled: true
  sources:
    spc_mesoanalysis:
      url: "https://www.spc.noaa.gov/exper/mesoanalysis/"
      purpose: "analysis fields for instability, shear, boundaries, low-level winds, and mesoscale context"
    hrrr_pivotal:
      url: "https://www.pivotalweather.com/model.php?m=hrrr"
      purpose: "HRRR reflectivity, QPF, instability, wind, and mesoscale trends"
    rap_pivotal:
      url: "https://www.pivotalweather.com/model.php?m=rap"
      purpose: "RAP mass fields, instability, moisture, wind, and short-term synoptic/mesoscale trends"
    nbm_weatherbell_placeholder:
      url: "https://www.weather.gov/mdl/nbm_home"
      purpose: "NBM forecast/probabilistic guidance reference; replace with local/AWIPS source as needed"
    href_spc:
      url: "https://www.spc.noaa.gov/exper/href/"
      purpose: "HREF neighborhood probability and CAM ensemble context"
    wpc_qpf:
      url: "https://www.wpc.ncep.noaa.gov/qpf/qpf2.shtml"
      purpose: "WPC QPF forecast context"
    wpc_ero:
      url: "https://www.wpc.ncep.noaa.gov/qpf/excessive_rainfall_outlook_ero.php"
      purpose: "WPC excessive rainfall outlook context"

screenshots:
  enabled: true
  viewport_width: 1600
  viewport_height: 1000
  pages:
    spc_mesoanalysis:
      url: "https://www.spc.noaa.gov/exper/mesoanalysis/"
      purpose: "current instability, shear, boundaries, and mesoscale context"
    spc_day1_outlook_graphic:
      url: "https://www.spc.noaa.gov/products/outlook/day1otlk.html"
      purpose: "SPC Day 1 categorical/graphic convective outlook"
    wpc_ero:
      url: "https://www.wpc.ncep.noaa.gov/qpf/excessive_rainfall_outlook_ero.php"
      purpose: "excessive rainfall outlook and heavy-rain context"
    wpc_mpd_index:
      url: "https://www.wpc.ncep.noaa.gov/metwatch/metwatch_mpd_multi.php"
      purpose: "WPC MPD visual/context page"
    nhc_home:
      url: "https://www.nhc.noaa.gov/"
      purpose: "tropical cyclone and disturbance context when relevant"

model_placeholders:
  # Future: add NOMADS/Herbie/xarray/cfgrib download and summary logic.
  hrrr:
    forecast_hours: [0, 3, 6, 12, 18]
    fields:
      - reflectivity
      - qpf
      - precipitable_water
      - mlcape
      - helicity
      - 850mb_wind
      - 500mb_height
