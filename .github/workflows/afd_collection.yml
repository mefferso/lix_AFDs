name: AFD Data Collection

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/afd_collection.yml"
      - "config/**"
      - "prompts/**"
      - "scripts/**"
      - "requirements.txt"
  schedule:
    # UTC times. Adjust for shift needs.
    - cron: "30 8,14,20 * * *"

concurrency:
  group: afd-data-collection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect-afd-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run AFD input pipeline
        run: |
          python scripts/run_pipeline.py

      - name: Upload AFD input package
        uses: actions/upload-artifact@v4
        with:
          name: afd-input-package
          path: output/latest/
          retention-days: 7
